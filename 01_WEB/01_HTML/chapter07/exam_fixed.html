<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      div {
        display: inline-block;
        position: relative; /* 부모라고 작성하고 있음 */
        border: 1px solid lightgray;
      }

      div > p {
        display: inline-block;
        position: absolute; /* 무조건 부모가 기준이 됨 => absolute때문에 */
        width: 15px;
        height: 20px;
        background: lightgray;
      }

      #fixed {
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 120px;
        padding: 5px;
        background: red;
        color: white;
      }
    </style>
  </head>
  <body>
    <h3>Merry Christmass!!</h3>
    <hr />
    <p>메리 크리스마스</p>
    <div>
      <img
        src="images/christmastree.png"
        width="200"
        height="200"
        alt="크리스마스 트리"
      />
      <p style="left: 50px; top: 30px">M</p>
      <p style="left: 100px; top: 0px">E</p>
      <p style="left: 100px; top: 80px">R</p>
      <p style="left: 150px; top: 110px">R</p>
      <p style="left: 30px; top: 130px">Y</p>
    </div>

    <div id="fixed">메리 크리스마스</div>
  </body>
</html>
