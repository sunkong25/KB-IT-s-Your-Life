<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .ellipsis {
        white-space: nowrap; /* 엔터가 포함되지 않아야된다. */
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <h1 class="ellipsis">
      Lorem ipsum dolor sit amet , consectetur adipiscing elit .
    </h1>
    <p class="ellipsis">
      Lorem ipsum dolor sit amet , consectetur adipiscing elit .
    </p>
  </body>
</html>
