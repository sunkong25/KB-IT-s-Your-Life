<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .item span {
        /* display: none; */
        visibility: hidden; /* 이벤트를 걸 수 없다. */
      }
      .item:hover span {
        visibility: visible;
        color: red;
      }
    </style>
  </head>
  <body>
    <h3>다음 빈 곳에 숨은 단어?</h3>
    <hr />
    <ul>
      <li>
        I (<span class="item"><span>love</span></span
        >) you.
      </li>
      <!-- hidden하면 이벤트도 안 걸림, span밖에 하나 더 걸어줘야 됨 -->
      <li>
        CSS is Cascading (<span class="item"><span>Style</span></span
        >) Sheet.
      </li>
      <li>
        응답하라 (<span class="item"><span>1988</span></span
        >).
      </li>
    </ul>
  </body>
</html>
