<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .imgDiv {
        border: 1px solid red;
        width: 150px;
        height: 150px;
        margin: 100px;
        overflow: hidden;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .imgDiv:hover img {
        transform: scale(1.4);
      }
      .imgDiv img {
        transition: all 0.35s linear;
      }
    </style>
  </head>
  <body>
    <div class="imgDiv">
      <img src="images/망상토끼.gif" alt="망상토끼" />
    </div>
  </body>
</html>
