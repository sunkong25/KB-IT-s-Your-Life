  <body>
    <script>
      //전역변수, 즉, a는 하나만 잡힌다.
      var a = 100;
      a = 250;
      console.log(a); //250
      {
        var a = 200;
        console.log(a); //200
        {
          var a = 300;
          console.log(a); //300
        }
        console.log(a); //300
      }
      console.log(a); //300
    </script>
  </body>
