<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function callbackFunction(callback, x) {
        for (let i = 0; i < x; i++) {
          callback();
        }
      }

      let fun = function () {
        alert('함수 호출');
      };

      callbackFunction(fun, 3);
    </script>
  </head>
  <body></body>
</html>
