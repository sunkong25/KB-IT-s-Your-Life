<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      function make1() {
        //구현
        console.log('Have a nice day!!');
      }
      make1(); //호출

      function make2(num) {
        console.log(`num = ${num}`);
      }
      make2(10);

      function make3(a, b) {
        console.log(`${a} + ${b} = ${a + b}`);
      }
      make3(2, 3);
      //화살표 함수
      const make11 = () => {
        console.log('Have a nice day!!');
      };
      make11();

      const make22 = (num) => {
        console.log(`num = ${num}`);
      };
      make22(2);
      const make33 = (a, b) => {
        console.log(`${a} + ${b} = ${a + b}`);
      };
      make33(2, 6);
    </script>
  </body>
</html>
