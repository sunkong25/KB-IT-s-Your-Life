<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const arr = [10, 20, 30, 40, 50, 60];

      //요소중에서 30보다 큰값만 추출
      const result1 = arr.filter((item) => item > 30);
      console.log(result1);
      console.log(result1.toString()); //문자열로 나옴

      //요소중에서 40인 값만 추출
      const result2 = arr.filter((item) => item === 40);
      console.log(result2);
      console.log(result2.toString());

      //요소중에서 40이 아닌 값만 추출
      const result3 = arr.filter((item) => item !== 40);
      console.log(result3);
      console.log(result3.toString());

      const data = [
        { id: 1, name: '홍길동', age: 25 },
        { id: 2, name: '어피치', age: 20 },
        { id: 3, name: '프로도', age: 35 },
      ];

      //홍길동인 값을 출력
      const data2 = data.filter((item) => item.name === '홍길동');
      console.log(data2);

      //id가 2번인 값을 삭제
      const data3 = data.filter((item) => item.id !== 2);
      console.log(data3);
    </script>
  </body>
</html>
