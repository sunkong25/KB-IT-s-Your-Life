<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form method="get">
      <!-- action 파트 생략할 때, 현재 url로 전송-->
      <!-- get 방식 요청 -->
      <fieldset>
        <legend>입력 양식</legend>
        <table>
          <tr>
            <td><label for="name">이름</label></td>
            <td><input id="name" name="name" type="text" /></td>
          </tr>
          <tr>
            <td><label for="mail">이메일</label></td>
            <td>
              <input id="mail" name="mail" type="email" value="test@abc.com" />
            </td>
          </tr>
        </table>
        <input type="submit" />
      </fieldset>
    </form>
  </body>
</html>
